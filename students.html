<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学生管理 / 学生导入</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script type="module" src="./assets/students.js"></script>
  </head>
  <body class="admin-body">
    <main class="page-shell admin-shell students-shell">
      <header class="admin-header surface-card">
        <div>
          <p class="eyebrow">Student Registry</p>
          <h1>学生管理 / 学生导入</h1>
        </div>
        <div class="header-actions">
          <button id="openCreateStudentButton" class="primary-button" type="button">手动新增学生</button>
          <button id="openImportDialogButton" class="ghost-button" type="button">批量导入 CSV</button>
          <button id="downloadTemplateButton" class="ghost-button" type="button">下载导入模板</button>
          <a class="inline-link" href="./admin.html">配置管理</a>
          <a class="inline-link" href="./index.html">返回首页</a>
        </div>
      </header>

      <section class="surface-card admin-section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Student Archive</p>
            <h2>学生主档列表</h2>
          </div>
          <p class="section-tip">教务统一导入和维护学生主档。老师后续建班时可搜索这些学生并加入班级。</p>
        </div>

        <form id="studentsSearchForm" class="students-search-form">
          <input id="studentsSearchInput" type="search" placeholder="搜索正式姓名 / 昵称 / 手机尾号 / 学号" />
          <button class="ghost-button" type="submit">搜索</button>
          <button id="clearStudentsSearchButton" class="inline-button" type="button">清空</button>
        </form>

        <div class="students-filter-grid">
          <label class="students-filter-label">
            <span>状态筛选</span>
            <select id="studentsStatusFilter">
              <option value="all">全部状态</option>
              <option value="normal">normal</option>
              <option value="temporary">temporary</option>
              <option value="pending_merge">pending_merge</option>
              <option value="merged">merged</option>
            </select>
          </label>
          <label class="students-filter-label">
            <span>校区筛选</span>
            <select id="studentsCampusFilter" disabled></select>
            <small>学生主档没有固定校区字段，MVP 暂不做精确校区筛选。</small>
          </label>
        </div>

        <div class="students-summary-grid">
          <div class="metric-chip">
            <strong id="studentTotalCount">0</strong>
            <span>当前列表学生数</span>
          </div>
          <div class="metric-chip">
            <strong id="studentStatusSummary">全部状态</strong>
            <span>当前状态筛选</span>
          </div>
          <div class="metric-chip">
            <strong id="studentSearchSummary">未搜索</strong>
            <span>当前搜索条件</span>
          </div>
        </div>

        <div id="studentsInlineNotice" class="teacher-inline-notice" hidden></div>
      </section>

      <section class="surface-card admin-section">
        <div class="table-wrap">
          <table class="editable-table students-table">
            <thead>
              <tr>
                <th>学生</th>
                <th>正式姓名</th>
                <th>年级</th>
                <th>家长姓名</th>
                <th>家长手机号</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody"></tbody>
          </table>
        </div>
      </section>

      <div id="studentsNotice" class="notice-bar" hidden></div>
    </main>

    <dialog id="studentDetailDialog" class="teacher-dialog">
      <div class="teacher-dialog-form students-dialog-form">
        <div class="teacher-dialog-head">
          <div>
            <p class="eyebrow">Student Detail</p>
            <h2>学生详情</h2>
          </div>
          <button id="closeStudentDetailButton" class="ghost-button" type="button">关闭</button>
        </div>
        <div id="studentDetailContent" class="students-detail-panel"></div>
      </div>
    </dialog>

    <dialog id="createStudentDialog" class="teacher-dialog">
      <form id="createStudentForm" class="teacher-dialog-form students-dialog-form">
        <div class="teacher-dialog-head">
          <div>
            <p class="eyebrow">Create Student</p>
            <h2>手动新增学生</h2>
          </div>
          <button id="closeCreateStudentButton" class="ghost-button" type="button">关闭</button>
        </div>

        <div class="students-form-grid">
          <label class="students-form-field">
            <span>正式姓名 *</span>
            <input id="createLegalNameInput" type="text" required />
          </label>
          <label class="students-form-field">
            <span>展示昵称</span>
            <input id="createDisplayNameInput" type="text" />
          </label>
          <label class="students-form-field">
            <span>年级</span>
            <input id="createGradeInput" type="text" />
          </label>
          <label class="students-form-field">
            <span>家长姓名</span>
            <input id="createParentNameInput" type="text" />
          </label>
          <label class="students-form-field">
            <span>家长手机号</span>
            <input id="createParentPhoneInput" type="text" inputmode="tel" />
          </label>
          <label class="students-form-field">
            <span>头像 URL</span>
            <input id="createAvatarUrlInput" type="url" />
          </label>
          <label class="students-form-field students-form-field--full">
            <span>备注</span>
            <textarea id="createNotesInput"></textarea>
          </label>
        </div>

        <div id="manualDuplicateBox" class="students-duplicate-box" hidden></div>

        <div class="teacher-dialog-actions">
          <button id="cancelCreateStudentButton" class="ghost-button" type="button">取消</button>
          <button id="submitCreateStudentButton" class="primary-button" type="submit">保存学生主档</button>
        </div>
      </form>
    </dialog>

    <dialog id="importStudentsDialog" class="teacher-dialog students-import-dialog">
      <div class="teacher-dialog-form students-dialog-form">
        <div class="teacher-dialog-head">
          <div>
            <p class="eyebrow">CSV Import</p>
            <h2>批量导入学生</h2>
          </div>
          <button id="closeImportDialogButton" class="ghost-button" type="button">关闭</button>
        </div>

        <div class="students-import-head">
          <label class="students-upload-field">
            <span>上传 CSV 文件</span>
            <input id="importFileInput" type="file" accept=".csv,text/csv" />
          </label>
          <div id="importPreviewSummary" class="students-import-summary">
            上传 CSV 后，这里会显示预览、可导入数量和疑似重复提醒。
          </div>
        </div>

        <div class="table-wrap">
          <table class="editable-table students-import-table">
            <thead>
              <tr>
                <th>行号</th>
                <th>展示昵称</th>
                <th>正式姓名</th>
                <th>年级</th>
                <th>家长手机号</th>
                <th>疑似重复</th>
                <th>校验结果</th>
              </tr>
            </thead>
            <tbody id="importPreviewTableBody"></tbody>
          </table>
        </div>

        <div class="teacher-dialog-actions">
          <button id="cancelImportButton" class="ghost-button" type="button">取消</button>
          <button id="confirmImportButton" class="primary-button" type="button" disabled>确认导入</button>
        </div>
      </div>
    </dialog>
  </body>
</html>
