<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大屏展示页</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script defer src="./assets/avatars/avatar-library.manifest.global.js"></script>
    <script defer src="./assets/file-preview-runtime.js"></script>
    <script defer src="./assets/display-file-preview.global.js"></script>
    <script type="module">
      function renderDisplayBootError(message) {
        function applyError() {
          const statusText = document.getElementById('displayStatusText');
          if (statusText) {
            statusText.textContent = message;
          }

          ['totalBoard', 'progressBoard', 'badgeBoard'].forEach(function (id) {
            const container = document.getElementById(id);
            if (container) {
              container.innerHTML = `<div class="empty-state">${message}</div>`;
            }
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', applyError, { once: true });
        } else {
          applyError();
        }
      }

      if (window.location.protocol !== 'file:') {
        import('./assets/display.js').catch(function (error) {
          const message = `大屏脚本加载失败：${error && error.message ? error.message : '未知错误'}`;
          console.error(error);
          renderDisplayBootError(message);
        });
      }
    </script>
  </head>
  <body class="display-body display-dopamine-body">
    <main class="display-shell display-dopamine-shell">
      <header class="display-header display-dopamine-header">
        <div class="display-title-wrap">
          <p class="eyebrow">Growth Wall</p>
          <h1>学生成长荣耀榜</h1>
          <p class="hero-copy">自动翻页、无需人工滚动，适合校区电视持续展示。</p>
        </div>
        <div class="display-meta">
          <div id="displayClock" class="clock-pill"></div>
          <a class="inline-link light-link" href="./index.html">返回首页</a>
        </div>
      </header>

      <section class="display-grid display-dopamine-grid">
        <article class="leaderboard-card gold-card display-board display-board--total">
          <div class="section-head on-dark display-board-head">
            <div>
              <p class="eyebrow">Leaderboard 01</p>
              <h2>总分榜</h2>
            </div>
            <div class="display-board-meta">
              <strong id="totalBoardPage"></strong>
            </div>
          </div>
          <div id="totalBoard" class="leaderboard-list display-leaderboard-list"></div>
        </article>

        <article class="leaderboard-card cyan-card display-board display-board--progress">
          <div class="section-head on-dark display-board-head">
            <div>
              <p class="eyebrow">Leaderboard 02</p>
              <h2>进步榜</h2>
            </div>
            <div class="display-board-meta">
              <strong id="progressBoardPage"></strong>
            </div>
          </div>
          <div id="progressBoard" class="leaderboard-list display-leaderboard-list"></div>
        </article>

        <article class="leaderboard-card coral-card display-board display-board--badge">
          <div class="section-head on-dark display-board-head">
            <div>
              <p class="eyebrow">Leaderboard 03</p>
              <h2>徽章榜</h2>
            </div>
            <div class="display-board-meta">
              <strong id="badgeBoardPage"></strong>
            </div>
          </div>
          <div id="badgeBoard" class="leaderboard-list display-leaderboard-list"></div>
        </article>
      </section>
    </main>
  </body>
</html>
