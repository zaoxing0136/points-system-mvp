<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>积分系统登录</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script type="module" src="./assets/login.js"></script>
  </head>
  <body class="auth-body auth-body--trial">
    <main class="page-shell auth-shell auth-shell--trial auth-shell--compact">
      <section class="auth-panel surface-card auth-panel--trial auth-panel--compact">
        <header class="auth-compact-intro">
          <p class="eyebrow">Trial Access</p>
          <h1>积分系统登录</h1>
          <p class="auth-copy">输入管理员分配的账号名和密码。管理员进入管理台，老师进入老师页。</p>
          <div class="auth-compact-meta">
            <span class="auth-meta-chip">统一登录入口</span>
            <span class="auth-meta-chip">老师首次登录先改密</span>
            <a class="auth-meta-chip auth-meta-chip--link" href="./display.html">直接打开积分大屏</a>
          </div>
        </header>

        <div class="auth-stage auth-stage--compact">
          <div id="loginNotice" class="notice-bar" hidden></div>

          <section id="loginCard" class="auth-card auth-card--trial">
            <div class="section-head auth-section-head auth-section-head--compact">
              <div>
                <p class="eyebrow">Sign In</p>
                <h2>账号登录</h2>
              </div>
              <p class="section-tip">输入管理员分配的账号名，例如 `cls` 或 `admin`。</p>
            </div>

            <form id="loginForm" class="auth-form auth-form--trial">
              <label class="field-group">
                <span>账号名</span>
                <input id="loginAccountInput" type="text" autocomplete="username" placeholder="例如：cls / xls / sls / admin" required />
              </label>
              <label class="field-group">
                <span>密码</span>
                <input id="loginPasswordInput" type="password" autocomplete="current-password" placeholder="请输入密码" required />
              </label>
              <button id="loginSubmitButton" class="primary-button auth-submit" type="submit">登录系统</button>
            </form>

            <div class="auth-footnote auth-footnote--trial">
              <span>老师首次登录后请先修改密码；忘记密码请联系管理员重置。</span>
            </div>
          </section>

          <section id="changePasswordCard" class="auth-card auth-card--trial" hidden>
            <div class="section-head auth-section-head auth-section-head--compact">
              <div>
                <p class="eyebrow">Password Update</p>
                <h2>首次登录请修改密码</h2>
              </div>
              <p id="changePasswordHint" class="section-tip">修改完成后再进入系统。</p>
            </div>

            <form id="changePasswordForm" class="auth-form auth-form--trial">
              <label class="field-group">
                <span>新密码</span>
                <input id="newPasswordInput" type="password" minlength="6" autocomplete="new-password" placeholder="至少 6 位" required />
              </label>
              <label class="field-group">
                <span>确认新密码</span>
                <input id="confirmPasswordInput" type="password" minlength="6" autocomplete="new-password" placeholder="再次输入新密码" required />
              </label>
              <button id="changePasswordButton" class="primary-button auth-submit" type="submit">保存新密码</button>
            </form>

            <div class="auth-footnote auth-footnote--trial">
              <span>保存后系统会自动进入对应角色页面。</span>
            </div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
