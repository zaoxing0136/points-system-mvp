<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>老师加分页</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script>
      window.__FILE_MODE__ = window.location.protocol === 'file:';
    </script>
    <script type="module" src="./assets/teacher.js"></script>
  </head>
  <body class="teacher-body teacher-console-body">
    <main class="page-shell teacher-console teacher-dopamine-console">
      <header class="teacher-console-header surface-card teacher-dopamine-header">
        <div class="teacher-header-main">
          <div class="teacher-header-title">
            <h1>老师加分</h1>
            <div id="fileModeNotice" class="teacher-inline-notice" hidden>当前是直接打开本地文件。请改用 `http://127.0.0.1:4175/teacher.html` 打开，真实数据和下拉交互才会生效。</div>
          </div>
          <div class="teacher-console-links">
            <a class="inline-link teacher-home-link" href="./index.html">返回首页</a>
          </div>
        </div>
      </header>

      <section class="teacher-command surface-card teacher-dopamine-command">
        <div class="teacher-command-main teacher-command-main--compact">
          <div class="filters-grid teacher-filters-grid">
            <label class="field-group">
              <span>校区</span>
              <select id="campusSelect"></select>
            </label>
            <label class="field-group">
              <span>班级</span>
              <select id="classSelect"></select>
            </label>
          </div>

          <div class="teacher-command-summary teacher-command-summary--compact">
            <div class="metric-chip">
              <span class="metric-label">人数</span>
              <strong id="studentCount">0</strong>
            </div>
            <div class="metric-chip">
              <span class="metric-label">总分</span>
              <strong id="classPoints">0</strong>
            </div>
            <strong id="selectedState" class="sr-only">等待选学生</strong>
          </div>
        </div>

        <div id="campusRailShell" class="teacher-rail-shell teacher-rail-shell--campus">
          <button id="campusRailPrevButton" class="teacher-rail-nav teacher-rail-nav--prev" type="button" aria-label="向左滚动" hidden>&larr;</button>
          <div class="teacher-rail-viewport">
            <div id="campusRail" class="teacher-filter-rail"></div>
          </div>
          <button id="campusRailNextButton" class="teacher-rail-nav teacher-rail-nav--next" type="button" aria-label="向右滚动" hidden>&rarr;</button>
        </div>
        <div id="classRailShell" class="teacher-rail-shell teacher-rail-shell--classes">
          <button id="classRailPrevButton" class="teacher-rail-nav teacher-rail-nav--prev" type="button" aria-label="向左滚动" hidden>&larr;</button>
          <div class="teacher-rail-viewport">
            <div id="classRail" class="teacher-filter-rail teacher-filter-rail--classes"></div>
          </div>
          <button id="classRailNextButton" class="teacher-rail-nav teacher-rail-nav--next" type="button" aria-label="向右滚动" hidden>&rarr;</button>
        </div>

        <div id="classMeta" class="teacher-class-meta"></div>

        <div class="teacher-class-actions">
          <div class="teacher-class-actions-row">
            <button id="openCreateClassButton" class="primary-button" type="button">快速建班</button>
            <button id="openAddStudentButton" class="ghost-button" type="button">搜索加人</button>
            <button id="classBoostToggleButton" class="ghost-button teacher-safe-button" type="button">整班 +1</button>
          </div>
          <div id="teacherInlineNotice" class="teacher-inline-notice" hidden></div>
        </div>
      </section>

      <section class="teacher-workspace teacher-dopamine-workspace">
        <section class="teacher-list-panel surface-card teacher-dopamine-list">
          <div class="teacher-list-head teacher-list-head--simple">
            <h2>学生</h2>
            <p id="selectionHint" class="section-tip" hidden></p>
          </div>
          <div id="studentGrid" class="teacher-student-grid"></div>
        </section>

        <aside id="teacherPanel" class="teacher-panel surface-card teacher-dopamine-panel" aria-hidden="true">
          <div class="teacher-panel-shell">
            <div class="teacher-panel-top">
              <button id="panelBackButton" class="inline-button teacher-back-button" type="button">返回学生列表</button>
              <button id="closeSheetButton" class="icon-button teacher-close-button" type="button" aria-label="关闭">×</button>
            </div>

            <div id="panelEmptyState" class="teacher-panel-empty">
              <h2>先选一个学生</h2>
            </div>

            <div id="panelContent" class="teacher-panel-content" hidden>
              <section id="studentSpotlight" class="student-spotlight"></section>

              <div class="teacher-panel-tools">
                <button id="removeSelectedStudentButton" class="ghost-button teacher-remove-button" type="button">&#x79FB;&#x51FA;&#x672C;&#x73ED;</button>
                <button id="openRedeemButton" class="ghost-button" type="button">&#x79EF;&#x5206;&#x5151;&#x6362;</button>
                <span id="redeemHint" class="teacher-panel-hint" hidden></span>
              </div>

              <nav id="categoryTabs" class="teacher-tabs" aria-label="积分分类"></nav>

              <section class="teacher-actions-section">
                <div class="teacher-actions-head">
                  <div>
                    <h3 id="activeCategoryTitle">课堂表现</h3>
                  </div>
                  <p id="activeCategoryTip" class="section-tip">点一下马上记分</p>
                </div>
                <div id="actionCards" class="teacher-action-grid"></div>
              </section>

              <section class="teacher-records-card">
                <div class="teacher-actions-head">
                  <div>
                    <h3>最近流水</h3>
                  </div>
                </div>
                <div id="studentRecordList" class="teacher-record-list"></div>
              </section>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <dialog id="createClassDialog" class="teacher-dialog">
      <form id="createClassForm" class="teacher-dialog-form">
        <div class="teacher-dialog-head">
          <div>
            <h2>快速建班</h2>
          </div>
          <button id="closeCreateClassButton" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>
        <label class="field-group">
          <span>班级名称</span>
          <input id="createClassNameInput" name="class_name" type="text" placeholder="例如：周三启航编程班" required />
        </label>
        <div class="filters-grid teacher-dialog-grid">
          <label class="field-group">
            <span>所属校区</span>
            <select id="createClassCampusSelect" name="campus_id" required></select>
          </label>
          <label class="field-group">
            <span>学科</span>
            <select id="createClassSubjectSelect" name="subject_id" required></select>
          </label>
        </div>
        <div class="filters-grid teacher-dialog-grid">
          <label class="field-group">
            <span>授课老师</span>
            <select id="createClassTeacherSelect" name="teacher_id"></select>
          </label>
          <label class="field-group">
            <span>班级类型</span>
            <select id="createClassTypeSelect" name="class_type">
              <option value="regular">常规班</option>
              <option value="trial">试听班</option>
              <option value="intensive">主题班</option>
              <option value="camp">假期班</option>
            </select>
          </label>
        </div>
        <div id="createClassTeacherHint" class="teacher-search-hint">老师端默认归属给当前老师。</div>
        <label class="field-group">
          <span>上课时间</span>
          <input id="createClassScheduleInput" name="schedule_text" type="text" placeholder="例如：周三 19:00-20:30" />
        </label>
        <div class="teacher-dialog-actions">
          <button class="primary-button" type="submit">创建班级</button>
          <button id="cancelCreateClassButton" class="ghost-button" type="button">取消</button>
        </div>
      </form>
    </dialog>

    <dialog id="addStudentDialog" class="teacher-dialog">
      <div class="teacher-dialog-form teacher-dialog-form--search">
        <div class="teacher-dialog-head">
          <div>
            <h2>搜索并加入班级</h2>
          </div>
          <button id="closeAddStudentButton" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>
        <form id="studentSearchForm" class="teacher-search-form">
          <input id="studentSearchInput" type="search" placeholder="搜索昵称 / 姓名 / 学号 / 家长手机号" />
          <button class="primary-button" type="submit">搜索</button>
        </form>
        <div id="studentSearchHint" class="teacher-search-hint">已有学生优先</div>
        <div id="studentSearchResults" class="teacher-search-results"></div>
        <section class="teacher-temp-student-box">
          <div class="teacher-temp-student-intro">
            <span class="teacher-temp-student-badge">临时建档</span>
            <h3>搜不到，直接先入班</h3>
            <p>先开课，再由教务补正式档案。</p>
            <div class="teacher-temp-student-pill-row" aria-hidden="true">
              <span class="teacher-temp-student-pill">试听</span>
              <span class="teacher-temp-student-pill">补课</span>`r`n              <span class="teacher-temp-student-pill">临时报名</span>
            </div>
          </div>
          <form id="createTempStudentForm" class="teacher-temp-student-form teacher-temp-student-form-card">
            <div class="filters-grid teacher-dialog-grid">
              <label class="field-group">
                <span>学生姓名</span>
                <input id="tempStudentLegalNameInput" type="text" placeholder="先填学生姓名" required />
              </label>
              <label class="field-group">
                <span>展示昵称</span>
                <input id="tempStudentDisplayNameInput" type="text" placeholder="可留空，默认同姓名" />
              </label>
            </div>
            <div class="filters-grid teacher-dialog-grid">
              <label class="field-group">
                <span>年级</span>
                <input id="tempStudentGradeInput" type="text" placeholder="例如：三年级 / 大班" />
              </label>
              <label class="field-group">
                <span>家长手机号</span>
                <input id="tempStudentParentPhoneInput" type="text" placeholder="方便课后联系" />
              </label>
            </div>
            <div class="filters-grid teacher-dialog-grid">
              <label class="field-group">
                <span>家长姓名</span>
                <input id="tempStudentParentNameInput" type="text" placeholder="可选" />
              </label>
              <label class="field-group">
                <span>备注</span>
                <input id="tempStudentNotesInput" type="text" placeholder="试听 / 补课 / 待教务确认" />
              </label>
            </div>
            <div class="teacher-dialog-actions teacher-dialog-actions--single">
              <button id="createTempStudentButton" class="primary-button" type="submit">创建临时学生并加入</button>
            </div>
          </form>
        </section>
      </div>
    </dialog>

    <dialog id="redeemDialog" class="teacher-dialog">
      <form id="redeemForm" class="teacher-dialog-form">
        <div class="teacher-dialog-head">
          <div>
            <h2>积分兑换</h2>
          </div>
          <button id="closeRedeemButton" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>
        <div id="redeemStudentMeta" class="teacher-dialog-meta"></div>
        <label class="field-group">
          <span>兑换内容</span>
          <input id="redeemItemInput" type="text" placeholder="例如：娃娃 / 盲盒 / 小奖品" required />
        </label>
        <label class="field-group">
          <span>扣除积分</span>
          <input id="redeemPointsInput" type="number" min="1" step="1" placeholder="例如：300" required />
        </label>
        <div id="redeemPreview" class="teacher-redeem-preview"></div>
        <div class="teacher-dialog-actions">
          <button id="redeemSubmitButton" class="primary-button" type="submit">确认兑换</button>
          <button id="cancelRedeemButton" class="ghost-button" type="button">取消</button>
        </div>
      </form>
    </dialog>


    <dialog id="classBoostDialog" class="teacher-dialog teacher-dialog--compact">
      <div class="teacher-dialog-form teacher-dialog-form--compact">
        <div class="teacher-dialog-head teacher-dialog-head--centered">
          <div>
            <h2>整班加 1 分</h2>
          </div>
          <button id="classBoostDialogCloseButton" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>
        <p id="classBoostDialogText" class="teacher-confirm-copy"></p>
        <div class="teacher-dialog-actions teacher-confirm-actions">
          <button id="classBoostDialogConfirmButton" class="primary-button" type="button">确认加分</button>
          <button id="classBoostDialogCancelButton" class="ghost-button" type="button">取消</button>
        </div>
      </div>
    </dialog>

    <div id="sheetOverlay" class="sheet-overlay" hidden></div>
    <div id="toast" class="toast" hidden></div>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (!window.__FILE_MODE__) {
          return;
        }

        document.getElementById('fileModeNotice')?.removeAttribute('hidden');

        const campusSelect = document.getElementById('campusSelect');
        const classSelect = document.getElementById('classSelect');
        const selectedState = document.getElementById('selectedState');
        const selectionHint = document.getElementById('selectionHint');

        if (campusSelect) {
          campusSelect.innerHTML = '<option value="">Use http://127.0.0.1:4175</option>';
          campusSelect.disabled = true;
        }

        if (classSelect) {
          classSelect.innerHTML = '<option value="">File mode disabled</option>';
          classSelect.disabled = true;
        }

        if (selectedState) {
          selectedState.textContent = 'Use local server URL';
        }

        if (selectionHint) {
          selectionHint.textContent = 'file:// mode is disabled for real data.';
        }

        [
          'openCreateClassButton',
          'openAddStudentButton',
          'classBoostToggleButton',
          'removeSelectedStudentButton',
          'openRedeemButton',
          'panelBackButton',
          'closeSheetButton'
        ].forEach(function (id) {
          const button = document.getElementById(id);
          if (button) {
            button.disabled = true;
          }
        });
      });
    </script>
  </body>
</html>
